<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Billing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">

<h3 class="text-center mb-4">💰 Monthly Billing</h3>

<form th:action="@{/billing}" method="post" class="row g-3">

    <div class="col-12 col-md-4">
        <select name="memberId" class="form-select" required>
            <option value="">Select Member</option>
            <option th:each="m : ${members}"
                    th:value="${m.id}"
                    th:text="${m.name}">
            </option>
        </select>
    </div>

    <div class="col-6 col-md-3">
        <input type="number" name="month" class="form-control"
               placeholder="Month" required>
    </div>

    <div class="col-6 col-md-3">
        <input type="number" name="year" class="form-control"
               placeholder="Year" required>
    </div>

    <div class="col-12 col-md-2">
        <button class="btn btn-primary w-100">Generate</button>
    </div>
</form>

<hr>

<div th:if="${member}" class="card p-3 shadow-sm">

    <h5>Bill Details</h5>
    <p><strong>Member:</strong> <span th:text="${member.name}"></span></p>
    <p><strong>Present Days:</strong> <span th:text="${presentDays}"></span></p>
    <p class="fs-5"><strong>Total:</strong> ₹ <span th:text="${totalAmount}"></span></p>

    <form th:action="@{/billing}" method="post">

        <input type="hidden" name="memberId" th:value="${member.id}">
        <input type="hidden" name="month" th:value="${month}">
        <input type="hidden" name="year" th:value="${year}">

        <div class="mt-3">
            <input type="number" name="paidAmount"
                   placeholder="Enter Paid Amount"
                   class="form-control">
        </div>

        <button class="btn btn-success w-100 mt-2">
            Save Payment
        </button>
    </form>

    <div th:if="${message}" class="alert alert-success mt-3">
        <span th:text="${message}"></span>
    </div>
</div>

<a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

</div>
</body>
</html>
