<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Billing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

<h2>💰 Monthly Billing</h2>

<form method="post" action="/billing" class="row g-3">

    <div class="col-md-4">
        <select name="memberId" class="form-select" required>
            <option value="">Select Member</option>
            <option th:each="m : ${members}"
                    th:value="${m.id}"
                    th:text="${m.name}">
            </option>
        </select>
    </div>

    <div class="col-md-3">
        <input type="number" name="month" class="form-control" placeholder="Month (1-12)" required>
    </div>

    <div class="col-md-3">
        <input type="number" name="year" class="form-control" placeholder="Year (2026)" required>
    </div>

    <div class="col-md-2">
        <button type="submit" class="btn btn-primary">Generate</button>
    </div>

</form>

<hr>

<div th:if="${member}">
    <h4>Bill Details</h4>
    <p><strong>Member:</strong> <span th:text="${member.name}"></span></p>
    <p><strong>Present Days:</strong> <span th:text="${presentDays}"></span></p>
    <p><strong>Meal Cost Per Day:</strong> ₹ <span th:text="${mealCost}"></span></p>
    <p><strong>Service Charge Per Day:</strong> ₹ <span th:text="${serviceCharge}"></span></p>
    <hr>
    <p><strong>Total Amount:</strong> ₹ <span th:text="${totalAmount}"></span></p>
    <form method="post" action="/billing">
    <input type="hidden" name="memberId" th:value="${member.id}">
    <input type="hidden" name="month" value="">
    <input type="hidden" name="year" value="">

    <div class="mt-3">
        <input type="number" name="paidAmount" placeholder="Enter Paid Amount" class="form-control">
    </div>

    <button type="submit" class="btn btn-success mt-2">
        Save Payment
    </button>

    <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
</form>

<div th:if="${message}" class="alert alert-success mt-3">
    <span th:text="${message}"></span>
</div>
    
</div>



<a href="/" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
