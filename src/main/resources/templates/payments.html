<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">💳 Payment Records</h2>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Member</th>
            <th>Month</th>
            <th>Year</th>
            <th>Total</th>
            <th>Paid</th>
            <th>Due</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="p : ${payments}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.member.name}"></td>
            <td th:text="${p.month}"></td>
            <td th:text="${p.year}"></td>
            <td th:text="${p.totalAmount}"></td>
            <td th:text="${p.paidAmount}"></td>
            <td th:text="${p.dueAmount}"></td>
            <td th:text="${p.paymentDate}"></td>
        </tr>
    </tbody>
</table>

<a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>

</div>

</body>
</html>
