<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">📊 Admin Dashboard</h2>

<div class="row">

    <div class="col-md-3">
        <div class="card text-white bg-primary mb-3">
            <div class="card-body">
                <h5>Total Members</h5>
                <h3 th:text="${totalMembers}"></h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-success mb-3">
            <div class="card-body">
                <h5>Total Revenue</h5>
                <h3>₹ <span th:text="${totalRevenue}"></span></h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-danger mb-3">
            <div class="card-body">
                <h5>Total Due</h5>
                <h3>₹ <span th:text="${totalDue}"></span></h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-white bg-dark mb-3">
            <div class="card-body">
                <h5>Total Attendance Records</h5>
                <h3 th:text="${totalAttendance}"></h3>
            </div>
        </div>
    </div>

    <a href="/members" class="btn btn-primary">Manage Members</a>
<a href="/attendance" class="btn btn-success">Attendance</a>
<a href="/billing" class="btn btn-warning">Billing</a>
<a href="/payments" class="btn btn-info">Payments</a>
<a href="/logout" class="btn btn-danger">Logout</a>


</div>

<a href="/" class="btn btn-secondary">Back to Home</a>

</div>

<hr>

<h4 class="mt-5">Revenue vs Due Chart</h4>

<canvas id="financeChart" height="100"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    const totalRevenue = [[${totalRevenue}]];
    const totalDue = [[${totalDue}]];

    const ctx = document.getElementById('financeChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Revenue', 'Due'],
            datasets: [{
                label: 'Amount (₹)',
                data: [totalRevenue, totalDue],
                backgroundColor: [
                    'rgba(40, 167, 69, 0.7)',
                    'rgba(220, 53, 69, 0.7)'
                ],
                borderColor: [
                    'rgba(40, 167, 69, 1)',
                    'rgba(220, 53, 69, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
