<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h2 class="mb-4 text-center text-md-start">📊 Admin Dashboard</h2>

    <!-- Stats Cards -->
    <div class="row g-3">

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card text-white bg-primary shadow-sm">
                <div class="card-body text-center">
                    <h6>Total Members</h6>
                    <h3 th:text="${totalMembers}"></h3>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body text-center">
                    <h6>Total Revenue</h6>
                    <h3>₹ <span th:text="${totalRevenue}"></span></h3>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card text-white bg-danger shadow-sm">
                <div class="card-body text-center">
                    <h6>Total Due</h6>
                    <h3>₹ <span th:text="${totalDue}"></span></h3>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card text-white bg-dark shadow-sm">
                <div class="card-body text-center">
                    <h6>Total Attendance</h6>
                    <h3 th:text="${totalAttendance}"></h3>
                </div>
            </div>
        </div>

    </div>

    <!-- Action Buttons -->
    <div class="row g-2 mt-4">

        <div class="col-6 col-md-4 col-lg-2">
            <a href="/members" class="btn btn-primary w-100">Members</a>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <a href="/attendance" class="btn btn-success w-100">Attendance</a>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <a href="/billing" class="btn btn-warning w-100">Billing</a>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <a href="/payments" class="btn btn-info w-100">Payments</a>
        </div>

        <div class="col-6 col-md-4 col-lg-2">
            <a href="/logout" class="btn btn-danger w-100">Logout</a>
        </div>

    </div>

    <!-- Chart Section -->
    <div class="card shadow-sm mt-5">
        <div class="card-body">
            <h5 class="mb-3 text-center">Revenue vs Due</h5>
            <canvas id="financeChart"></canvas>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    const totalRevenue = [[${totalRevenue}]];
    const totalDue = [[${totalDue}]];

    const ctx = document.getElementById('financeChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Revenue', 'Due'],
            datasets: [{
                label: 'Amount (₹)',
                data: [totalRevenue, totalDue],
                backgroundColor: [
                    'rgba(40, 167, 69, 0.7)',
                    'rgba(220, 53, 69, 0.7)'
                ],
                borderColor: [
                    'rgba(40, 167, 69, 1)',
                    'rgba(220, 53, 69, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
