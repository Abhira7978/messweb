<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Khana Khazana Web</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">🍽 Khana Khazana - Web Version</h1>

    <!-- Add / Update Form -->
    <div class="card mb-4">
        <div class="card-header bg-primary text-white">
            Add / Update Member
        </div>
        <div class="card-body">

            <form th:action="${member.id} != null ? @{/members/update} : @{/members}"
                  th:object="${member}" 
                  method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="row mb-3">
                    <div class="col">
                        <input type="text" class="form-control" 
                               placeholder="Name" th:field="*{name}" required>
                    </div>
                    <div class="col">
                        <input type="text" class="form-control" 
                               placeholder="Room No" th:field="*{roomNo}" required>
                    </div>
                    <div class="col">
                        <input type="text" class="form-control" 
                               placeholder="Phone" th:field="*{phone}" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-success">
                    <span th:text="${member.id} != null ? 'Update Member' : 'Add Member'"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Member Table -->
    <div class="card">
        <div class="card-header bg-dark text-white">
            Member List
        </div>
        <div class="card-body">

            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Room</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="m : ${members}">
                    <td th:text="${m.id}"></td>
                    <td th:text="${m.name}"></td>
                    <td th:text="${m.roomNo}"></td>
                    <td th:text="${m.phone}"></td>
                    <td>
                        <a th:href="@{/members/edit/{id}(id=${m.id})}" 
                           class="btn btn-warning btn-sm">Edit</a>

                        <a th:href="@{/members/edit/{id}(id=${m.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure?')">
                           Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>

        </div>
    </div>

</div>

</body>
</html>
