<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">

<h3 class="mb-4 text-center">📅 Mark Attendance</h3>

<form th:action="@{/attendance/save}" method="post" class="row g-3">

    <div class="col-12 col-md-4">
        <select name="memberId" class="form-select" required>
            <option value="">Select Member</option>
            <option th:each="m : ${members}"
                    th:value="${m.id}"
                    th:text="${m.name}">
            </option>
        </select>
    </div>

    <div class="col-12 col-md-4">
        <div class="form-check">
            <input type="checkbox" name="breakfast" class="form-check-input">
            <label class="form-check-label">Breakfast ₹20</label>
        </div>
        <div class="form-check">
            <input type="checkbox" name="lunch" class="form-check-input">
            <label class="form-check-label">Lunch ₹50</label>
        </div>
        <div class="form-check">
            <input type="checkbox" name="dinner" class="form-check-input">
            <label class="form-check-label">Dinner ₹30</label>
        </div>
    </div>

    <div class="col-12 col-md-2">
        <button class="btn btn-success w-100">
            Save
        </button>
    </div>
</form>

<hr>

<h4 class="mt-4">Records</h4>

<!-- Desktop Table -->
<div class="d-none d-md-block table-responsive">
<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Member</th>
            <th>Date</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="a : ${attendanceList}">
            <td th:text="${a.id}"></td>
            <td th:text="${a.member.name}"></td>
            <td th:text="${a.date}"></td>
            <td>
                <span th:if="${a.breakfast}" class="badge bg-primary">Breakfast</span>
                <span th:if="${a.lunch}" class="badge bg-warning text-dark">Lunch</span>
                <span th:if="${a.dinner}" class="badge bg-success">Dinner</span>
                <span th:if="${!a.breakfast and !a.lunch and !a.dinner}" class="badge bg-danger">
                    Absent
                </span>
            </td>
        </tr>
    </tbody>
</table>
</div>

<!-- Mobile Cards -->
<div class="d-md-none">
    <div th:each="a : ${attendanceList}" class="card mb-3 shadow-sm">
        <div class="card-body">
            <h6 th:text="${a.member.name}"></h6>
            <small th:text="${a.date}"></small><br><br>
            <span th:if="${a.breakfast}" class="badge bg-primary">Breakfast</span>
            <span th:if="${a.lunch}" class="badge bg-warning text-dark">Lunch</span>
            <span th:if="${a.dinner}" class="badge bg-success">Dinner</span>
            <span th:if="${!a.breakfast and !a.lunch and !a.dinner}" class="badge bg-danger">
                Absent
            </span>
        </div>
    </div>
</div>

<a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

</div>
</body>
</html>
