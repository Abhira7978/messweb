<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4">📅 Mark Attendance</h2>

    <form method="post" action="/attendance">
        <div class="row mb-3">
            <div class="col">
                <select name="memberId" class="form-select" required>
                    <option value="">Select Member</option>
                    <option th:each="m : ${members}"
                            th:value="${m.id}"
                            th:text="${m.name}">
                    </option>
                </select>
            </div>

            <div class="col">
    <label class="form-label">Meals</label>

    <div class="form-check">
        <input class="form-check-input" type="checkbox" name="breakfast">
        <label class="form-check-label">Breakfast (₹20)</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="checkbox" name="lunch">
        <label class="form-check-label">Lunch (₹50)</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="checkbox" name="dinner">
        <label class="form-check-label">Dinner (₹30)</label>
    </div>
</div>

            <div class="col">
                <button type="submit" class="btn btn-success">
                    Save Attendance
                </button>
            </div>
        </div>
    </form>

    <hr>

<h4 class="mt-4">Attendance Records</h4>

<table class="table table-bordered table-striped mt-3">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Member</th>
            <th>Date</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="a : ${attendanceList}">
            <td th:text="${a.id}"></td>
            <td th:text="${a.member.name}"></td>
            <td th:text="${a.date}"></td>
            <td>
                <span th:if="${a.present}" class="text-success">Present</span>
                <span th:unless="${a.present}" class="text-danger">Absent</span>
            </td>
        </tr>
    </tbody>
</table>

    <a href="/" class="btn btn-secondary">Back to Home</a>

</div>

</body>
</html>
